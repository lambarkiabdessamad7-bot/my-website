<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sit-calcu</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
background-color: #09e2ea;
}
h1 {
    color: white;
    font-size: 40px;
    font-weight: bold;
    margin-top: 20px;
}
main {
    background-color: rgb(51, 7, 92);
    width: 500px;
    height: 750px;
    margin: 100px auto;
    border-radius: 20px;
    text-align: center;
    padding-top: 5px;
}
.afichage {
    background-color: rgb(249, 243, 231);
    width: 400px;
    height: 60px;
    margin: 50px auto 10px auto;
    border-radius: 20px;
    margin-bottom: 50px;
    font-size: 30px;
    font-weight: bold;
    text-align: left;
    padding: 20px;

    


    
}
.btn{
     margin: 10px;
    width: 80px;
    height: 80px;
    border: none;
    border-radius: 50px;
    font-size: large;
    font-weight: bold;
    transition: 0.3s;
    transform: 0.3s;

}
:hover.btn{
    background-color: rgb(69, 223, 8);
    color: black;
    cursor: pointer;
    transform: scale(1.1);

}
.btn1{
    margin: 10px;
    width: 80px;
    height: 80px;
    border: none;
    border-radius: 50px;
    font-size: 30px;
    font-weight: bold;
    background-color: rgb(176, 247, 12);
    transition: 0.3s;
    transform: 0.3s;
}
:hover.btn1{
    background-color: rgb(221, 67, 25);
    color: black;
    cursor: pointer;
    transform: scale(1.1);

}
    </style>
    
</head>
<body>
    <main>
        <h1>Calculator <span style="color:rgb(237, 15, 15)">MBK</span></h1>
        <div class="afichage">

        </div>
        <div class="numero1">
            <button class="btn" id="btn1">7</button>
            <button class="btn" id="btn2">8</button>
            <button class="btn" id="btn3">9</button>
            <button class="btn1" id="btn*">*</button>
            </div>
            <div class="numero2">
            <button class="btn" id="btn4">4</button>
            <button class="btn" id="btn5">5</button>
            <button class="btn" id="btn6">6</button>
            <button class="btn1" id="btn-">-</button>
            </div>
            <div class="numero3">
            <button class="btn" id="btn1">1</button>
            <button class="btn" id="btn2">2</button>
            <button class="btn" id="btn3">3</button>
            <button class="btn1" id="btn+">+</button>            
            </div>
            <div class="numero4">
            <button  onclick="clearONE()" class="btn1" id="btnclear"><i class="fa-solid fa-delete-left"></i></button>
            <button class="btn" id="btn0">0</button>
            <button class="btn1" id="btn/">/</button>
            <button class="btn1" id="btn=">=</button>
            </div>

    </main>
    <script>
let buttons = document.querySelectorAll('.btn');
let display = document.querySelector('.afichage');
buttons.forEach(button => {
    button.addEventListener('click', () => {
        display.textContent += button.textContent;
    });
});
// if division by zero, display error message

let operators = document.querySelectorAll('.btn1');
operators.forEach(operator => {
    operator.addEventListener('click', () => {
        if (operator.id === 'btn=') {
            try {
                display.textContent= eval(display.textContent);
                display.style.color = 'rgb(0,100,0)';
                display.style.textAlign = 'center';
                display.style.fontSize = '50px';
            } catch (e){
                alert('Error: Invalid expression.');
                display.textContent = '';
            }
      
        } else if (operator.id === 'btn/') {
            if (display.textContent.includes('0') || display.textContent.includes('Infinity')) {
                alert('Error: Division by zero is not allowed.');
                display.textContent = '';
            } else {
                display.textContent += operator.textContent;
            }
        }
        else {
            display.textContent += operator.textContent;
        }
    });
});
   function clearONE() {
    let currentText = display.textContent;
    display.textContent = currentText.slice(0, -1); 
    }
              
            


    </script>
</body>
</html>
